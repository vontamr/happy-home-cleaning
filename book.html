<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Cleaning | Happy Home Cleaning LLC - Winter Haven, FL</title>
    
    <script src="https://cdn.tailwindcss.com" async></script>
    <script>
        function initTailwind() {
            tailwind.config = {
                content: ["./**/*.{html,js}"],
                theme: {
                    extend: {
                        colors: {
                            sage: '#7E9A6E',
                            mint: '#B8D1B8',
                            cream: '#F8F4ED',
                        }
                    }
                }
            };
        }
        window.addEventListener('load', initTailwind);
    </script>
</head>
<body class="bg-cream text-[#2C2C2C] font-sans">

    <!-- Navigation -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-sage text-white rounded-2xl flex items-center justify-center text-3xl">🧼</div>
                    <div>
                        <span class="text-3xl font-light tracking-tight text-sage">Happy Home</span>
                        <span class="block text-xs font-medium text-gray-500 -mt-1">CLEANING LLC</span>
                    </div>
                </a>
                <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                    <a href="index.html" class="hover:text-sage">Home</a>
                    <a href="services.html" class="hover:text-sage">Services</a>
                    <a href="about.html" class="hover:text-sage">About</a>
                    <a href="book.html" class="text-sage font-semibold">Book Now</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Booking Form -->
    <div class="max-w-2xl mx-auto px-6 py-16">
        <div class="bg-white rounded-3xl shadow-xl p-10 md:p-12">
            <div class="text-center mb-10">
                <div class="inline-flex items-center gap-2 bg-sage/10 text-sage px-6 py-2 rounded-3xl mb-6">
                    <span class="text-2xl">🧼</span>
                    <span class="font-medium">Winter Haven, FL</span>
                </div>
                <h1 class="text-4xl font-light tracking-tight">Book Your Cleaning</h1>
                <p class="text-gray-600 mt-3">Women-owned • Professional • Reliable</p>
            </div>

            <form action="https://formspree.io/f/xqewlbnw" method="POST" class="space-y-8">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Full Name *</label>
                        <input type="text" name="name" required class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-sage outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Phone Number *</label>
                        <input type="tel" name="phone" required class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-sage outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Email Address *</label>
                    <input type="email" name="email" required class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-sage outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Type of Cleaning *</label>
                    <select name="service" required class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-sage outline-none">
                        <option value="">Select service...</option>
                        <option value="Recurring Maid Service">Recurring Maid Service</option>
                        <option value="Deep Cleaning">Deep Cleaning</option>
                        <option value="Move-In / Move-Out Cleaning">Move-In / Move-Out Cleaning</option>
                        <option value="One-Time Cleaning">One-Time Cleaning</option>
                        <option value="Post-Construction Cleaning">Post-Construction Cleaning</option>
                    </select>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Preferred Date</label>
                        <input type="date" name="date" class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-sage outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Preferred Time</label>
                        <select name="time" class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-sage outline-none">
                            <option value="">Any time is fine</option>
                            <option value="Morning (8am-12pm)">Morning (8am-12pm)</option>
                            <option value="Afternoon (12pm-4pm)">Afternoon (12pm-4pm)</option>
                            <option value="Evening (4pm-7pm)">Evening (4pm-7pm)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Property Details & Special Requests</label>
                    <textarea name="message" rows="4" placeholder="Example: 3 bed 2 bath, focus on kitchen, have pets, etc."
                              class="w-full px-5 py-4 rounded-3xl border border-gray-200 focus:border-sage outline-none resize-y"></textarea>
                </div>

                <input type="hidden" name="_subject" value="New Booking Request - Happy Home Cleaning">
                <input type="hidden" name="_next" value="https://vontamr.github.io/happy-home-cleaning/thank-you.html">

                <button type="submit"
                        class="w-full bg-sage hover:bg-[#6B8459] text-white py-6 rounded-3xl font-semibold text-lg transition-all">
                    Submit Booking Request
                </button>

                <p class="text-center text-xs text-gray-500">
                    We'll reply within 1 business day with availability and pricing.
                </p>
            </form>
        </div>
    </div>

</body>
</html>
